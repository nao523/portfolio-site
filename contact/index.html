<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | NAO's portfolio</title>
  <meta name="description" content="Webデザイン・コーディング制作のご相談を承っております。お気軽にご連絡ください。">
  <meta property="og:title" content="お問い合わせ | NAO's portfolio">
  <meta property="og:description" content="Webデザイン・コーディング制作のご相談を承っております。お気軽にご連絡ください。">
  <meta property="og:image" content="https://nao523.github.io/nao-portfolio/img/OGP.png">
  <meta property="og:url" content="https://nao523.github.io/nao-portfolio/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="お問い合わせ | NAO's portfolio">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="../img/favicon.ico">
  <link rel="icon" href="../img/favicon.png" type="image/png">
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Zen+Kaku+Gothic+New&family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="header">
      <div class="header_logo">
        <a href="../index.html">NAO</a>
      </div>
      <button type="button" class="hamburger" aria-controls="global-nav" aria-expanded="false" aria-label="メニューを開く">
        <span class="visually-hidden">メニューを開く</span>
        <span class="line line1"></span>
        <span class="line line2"></span>
        <span class="line line3"></span>
      </button>
      <nav class="header_nav" id="global-nav">
        <div class="nav_images">
          <img src="../img/nav1.png" alt="ネモフィラとミツバチ" class="nav_image nav_image1">
          <img src="../img/nav2.png" alt="ネモフィラとルリビタキ" class="nav_image nav_image2">
        </div>
        <ul class="header_nav_list">
          <li class="header_nav_item"><a href="../index.html">HOME</a></li>
          <li class="header_nav_item"><a href="../about/index.html">ABOUT</a></li>
          <li class="header_nav_item"><a href="../works/index.html">WORKS</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main>
    <section class="contact">
      <h1 class="heading heading--contact">CONTACT</h1>
      <!-- Netlify Forms用。ローカルでは/thanks/に遷移しないため要注意 -->
      <form 
        class="contact_form" 
        name="contact"
        method="post"
        data-netlify="true"
        action="/thanks/"
      >
      <input type="hidden" name="form-name" value="contact">
      <div class="contact_form_wrapper">
        <p class="contact_text">制作のご依頼やお問い合わせは<br>下記フォームからご連絡ください</p>
        <div class="form_list">
          <div class="form_group">
            <label for="name">お名前</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form_group">
            <label for="email">メールアドレス</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form_group">
            <label for="message">お問い合わせ内容</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>
        </div>
      </div>
      <button type="submit" class="btn btn--contact">Send</button>
      </form>
      <img src="../img/contact2.png" alt="いちごと茶色のうさぎ" class="contact_image_left fade-in">
      <img src="../img/contact3.png" alt="いちごと灰色のうさぎ" class="contact_image_right fade-in">
      <img src="../img/contact_sp2.png" alt="いちごと茶色のうさぎ" class="contact_image_sp_left fade-in">
      <img src="../img/contact_sp3.png" alt="いちごと灰色のうさぎ" class="contact_image_sp_right fade-in">
    </section>
  </main>
  <a href="#" class="to_top">
    <img src="../img/top.png" alt="TOPへ戻る">
  </a>
  <footer class="footer">
    <p class="footer_text">© 2026 NAO's portfolio</p>
  </footer>
  <script src="../js/main.js" defer></script>
</body>
</html>
